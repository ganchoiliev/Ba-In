<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страницата не е намерена | Beauty Atelier IN</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/favicon-16x16.png" />
    <link rel="manifest" href="assets/images/favicons/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e8e0d8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .logo {
            margin-bottom: 48px;
        }

        .logo img {
            height: 52px;
            width: auto;
        }

        .error-code {
            font-size: clamp(80px, 18vw, 160px);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #d4a96a 0%, #e8c99a 50%, #d4a96a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 600;
            color: #f0ebe4;
            margin-bottom: 16px;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(232, 224, 216, 0.65);
            max-width: 420px;
            margin: 0 auto 40px;
        }

        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-decoration: none;
            transition: opacity 0.2s ease, transform 0.15s ease;
        }

        .btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .btn--primary {
            background: #d4a96a;
            color: #1a1a2e;
        }

        .btn--secondary {
            background: transparent;
            color: rgba(232, 224, 216, 0.8);
            border: 1px solid rgba(232, 224, 216, 0.25);
        }

        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #d4a96a, transparent);
            margin: 32px auto;
            border-radius: 2px;
        }

        .quick-links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .quick-links a {
            font-size: 13px;
            color: rgba(232, 224, 216, 0.5);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .quick-links a:hover {
            color: #d4a96a;
        }
    </style>
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body>

    <div class="logo">
        <a href="index.html">
            <img src="assets/images/logo-light.webp" alt="Beauty Atelier IN" />
        </a>
    </div>

    <div class="error-code">404</div>

    <h1>Страницата не е намерена</h1>
    <p>Тази страница не съществува или е преместена. Върнете се към началото или изберете услуга.</p>

    <div class="btn-group">
        <a href="index.html" class="btn btn--primary">Начало</a>
        <a href="contact.html" class="btn btn--secondary">Контакти</a>
    </div>

    <div class="divider"></div>

    <div class="quick-links">
        <a href="procedures.html">Процедури</a>
        <a href="pricing.html">Ценоразпис</a>
        <a href="about.html">За нас</a>
        <a href="blog.html">Блог</a>
        <a href="appointment.html">Запази час</a>
    </div>

</body>
</html>
